<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>食材レシピAI</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FDFAF4;
    --surface: #FFFFFF;
    --orange: #F4845F;
    --orange-light: #FDEEE8;
    --green: #5A9E72;
    --green-light: #EAF5ED;
    --text: #2D2016;
    --text-muted: #8A7060;
    --border: #EDE4D8;
    --shadow: 0 4px 24px rgba(100,60,20,0.10);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 1.35rem;
    color: var(--text);
    letter-spacing: 0.03em;
  }

  header h1 span {
    color: var(--orange);
  }

  header p {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* UPLOAD ZONE */
  .upload-zone {
    background: var(--surface);
    border: 2.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .upload-zone.has-image {
    border-style: solid;
    border-color: var(--orange);
    padding: 0;
  }

  .upload-zone:active { transform: scale(0.98); }

  .upload-zone .icon {
    font-size: 3rem;
    margin-bottom: 10px;
    display: block;
  }

  .upload-zone .upload-label {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--text);
  }

  .upload-zone .upload-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 6px;
  }

  #fileInput { display: none; }

  #previewImg {
    width: 100%;
    border-radius: calc(var(--radius) - 2px);
    display: block;
    max-height: 280px;
    object-fit: cover;
  }

  .change-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 0.75rem;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }

  /* STYLE SELECT */
  .section-label {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
    margin: 22px 0 10px;
  }

  .style-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .style-card {
    background: var(--surface);
    border: 2.5px solid var(--border);
    border-radius: 16px;
    padding: 18px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
    position: relative;
  }

  .style-card.active {
    border-color: var(--orange);
    background: var(--orange-light);
  }

  .style-card .card-icon { font-size: 2.2rem; display: block; }
  .style-card .card-title {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    margin-top: 8px;
    color: var(--text);
  }
  .style-card .card-desc {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* カスタムカード削除ボタン */
  .delete-card-btn {
    position: absolute;
    top: 6px;
    right: 8px;
    background: none;
    border: none;
    font-size: 0.85rem;
    color: var(--text-muted);
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 50%;
    transition: background 0.15s;
  }
  .delete-card-btn:hover { background: var(--border); }

  /* カスタム追加カード */
  .add-card {
    background: var(--surface);
    border: 2.5px dashed var(--border);
    border-radius: 16px;
    padding: 18px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }
  .add-card:active { transform: scale(0.97); }
  .add-card .add-icon { font-size: 2rem; display: block; color: var(--text-muted); }
  .add-card .add-label {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* 追加モーダル */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-box h3 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    margin-bottom: 16px;
    color: var(--text);
  }
  .modal-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .modal-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }
  .modal-input:focus { border-color: var(--orange); }
  .modal-add-btn {
    padding: 10px 18px;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .modal-cancel {
    width: 100%;
    margin-top: 8px;
    padding: 12px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .modal-hint {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .emoji-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .emoji-btn {
    font-size: 1.4rem;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .emoji-btn.selected { border-color: var(--orange); background: var(--orange-light); }

  /* EXTRAS */
  .extras {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 10px;
  }

  .extras textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    background: var(--bg);
    resize: none;
    height: 70px;
    outline: none;
    transition: border-color 0.2s;
  }
  .extras textarea:focus { border-color: var(--orange); }

  /* SUBMIT BTN */
  #submitBtn {
    width: 100%;
    margin-top: 22px;
    padding: 18px;
    background: linear-gradient(135deg, var(--orange) 0%, #E8633C 100%);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(244,132,95,0.4);
    transition: all 0.2s ease;
  }
  #submitBtn:active { transform: scale(0.97); box-shadow: none; }
  #submitBtn:disabled {
    background: #D4C5B8;
    box-shadow: none;
    cursor: not-allowed;
  }

  /* LOADING */
  .loading-wrap {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap p {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  /* RESULT */
  #result {
    display: none;
    margin-top: 24px;
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .result-header h2 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    color: var(--text);
  }
  .result-badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 50px;
  }
  .badge-guts { background: var(--orange-light); color: var(--orange); }
  .badge-healthy { background: var(--green-light); color: var(--green); }

  .result-content {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    font-size: 0.88rem;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
  }

  .result-content h3 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--orange);
    margin: 16px 0 6px;
  }
  .result-content h3:first-child { margin-top: 0; }

  .retry-btn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: var(--surface);
    color: var(--text-muted);
    border: 2px solid var(--border);
    border-radius: 50px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .retry-btn:active { background: var(--border); }

  /* DETECTED INGREDIENTS CHIP */
  .ingredient-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .chip {
    background: var(--orange-light);
    color: var(--orange);
    border-radius: 50px;
    padding: 4px 12px;
    font-size: 0.78rem;
    font-weight: 700;
    font-family: 'Zen Maru Gothic', sans-serif;
  }

  /* GENRE TAGS */
  .genre-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .genre-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 50px;
    padding: 7px 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
  }
  .genre-tag.active {
    border-color: var(--orange);
    background: var(--orange-light);
    color: var(--orange);
  }
  .genre-tag .del-tag {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: 2px;
    line-height: 1;
  }
  .genre-add-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: 2px dashed var(--border);
    border-radius: 50px;
    padding: 7px 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.18s;
  }
  .genre-add-btn:active { background: var(--border); }

  /* ALLERGY TAGS */
  .allergy-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .allergy-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 50px;
    padding: 7px 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
  }
  .allergy-tag.active {
    border-color: #E05252;
    background: #FDF0F0;
    color: #E05252;
  }
  .allergy-tag .del-tag {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: 2px;
    line-height: 1;
  }
  .allergy-add-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: 2px dashed var(--border);
    border-radius: 50px;
    padding: 7px 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.18s;
  }
  .allergy-add-btn:active { background: var(--border); }

  .upload-btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .upload-btn {
    background: var(--orange-light);
    color: var(--orange);
    border: 2px solid var(--orange);
    border-radius: 50px;
    padding: 9px 18px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.18s;
  }
  .upload-btn:active { background: var(--orange); color: #fff; }
</style>
</head>
<body>

<header>
  <h1>🍳 食材 <span>レシピAI</span></h1>
  <p>写真を撮るだけで、今日の献立を提案します</p>
</header>

<div class="container">

  <!-- UPLOAD -->
  <p class="section-label">① 食材の写真を撮る・選ぶ</p>
  <div class="upload-zone" id="uploadZone">
    <span class="icon">📷</span>
    <p class="upload-label">写真を選んでください</p>
    <div class="upload-btn-row">
      <button class="upload-btn" onclick="document.getElementById('fileCamera').click()">📷 カメラで撮影</button>
      <button class="upload-btn" onclick="document.getElementById('fileGallery').click()">🖼️ カメラロールから</button>
    </div>
    <img id="previewImg" style="display:none">
    <button class="change-btn" id="changeBtn" style="display:none" onclick="event.stopPropagation(); showUploadButtons()">📷 変更</button>
  </div>
  <input type="file" id="fileCamera" accept="image/*" capture="environment" style="display:none">
  <input type="file" id="fileGallery" accept="image/*" style="display:none">

  <!-- STYLE -->
  <p class="section-label">② どんな料理にしたい？</p>
  <div class="style-cards" id="styleCards">
    <!-- カードはJSで動的生成 -->
  </div>

  <!-- 追加モーダル -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-box">
      <h3>✏️ スタイルを追加する</h3>
      <p class="modal-hint">絵文字を選んで、名前と説明を入力してください</p>
      <div class="emoji-picker" id="emojiPicker"></div>
      <div class="modal-row">
        <input class="modal-input" id="customName" placeholder="例：時短系" maxlength="10">
        <button class="modal-add-btn" onclick="addCustomStyle()">追加</button>
      </div>
      <input class="modal-input" id="customDesc" placeholder="例：10分で完成・忙しい日向け" maxlength="20" style="width:100%; margin-bottom:4px;">
      <button class="modal-cancel" onclick="document.getElementById('modalOverlay').classList.remove('show')">キャンセル</button>
    </div>
  </div>

  <!-- GENRE -->
  <p class="section-label" style="margin-top:22px;">③ 料理ジャンル（任意）</p>
  <div class="genre-wrap" id="genreWrap"><!-- タグはJSで生成 --></div>

  <!-- ジャンル追加モーダル -->
  <div class="modal-overlay" id="genreModalOverlay" onclick="closeGenreModal(event)">
    <div class="modal-box">
      <h3>🍽️ ジャンルを追加する</h3>
      <p class="modal-hint">追加したいジャンル名を入力してください</p>
      <div class="modal-row">
        <input class="modal-input" id="customGenreName" placeholder="例：パスタ、カレー、揚げ物…" maxlength="10">
        <button class="modal-add-btn" onclick="addCustomGenre()">追加</button>
      </div>
      <button class="modal-cancel" onclick="document.getElementById('genreModalOverlay').classList.remove('show')">キャンセル</button>
    </div>
  </div>

  <!-- ALLERGY -->
  <p class="section-label" style="margin-top:22px;">⑤ アレルギー食材（任意）</p>
  <div class="allergy-wrap" id="allergyWrap"><!-- タグはJSで生成 --></div>

  <!-- アレルギー追加モーダル -->
  <div class="modal-overlay" id="allergyModalOverlay" onclick="closeAllergyModal(event)">
    <div class="modal-box">
      <h3>⚠️ アレルギー食材を追加する</h3>
      <p class="modal-hint">避けたい食材名を入力してください</p>
      <div class="modal-row">
        <input class="modal-input" id="customAllergyName" placeholder="例：ナッツ、鶏肉、にんにく…" maxlength="10">
        <button class="modal-add-btn" style="background:#E05252;" onclick="addCustomAllergy()">追加</button>
      </div>
      <button class="modal-cancel" onclick="document.getElementById('allergyModalOverlay').classList.remove('show')">キャンセル</button>
    </div>
  </div>

  <!-- EXTRAS -->
  <p class="section-label" style="margin-top:22px;">⑥ 一言メモ（任意）</p>
  <div class="extras">
    <textarea id="extraNote" placeholder="例：子どもも食べられるもの、時短で作りたい、冷蔵庫にある調味料は醤油・みりんだけ…など"></textarea>
  </div>

  <button id="submitBtn" onclick="generate()">✨ レシピを考えてもらう</button>

  <!-- LOADING -->
  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <p>食材を認識して、レシピを考えています…</p>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="result-header">
      <h2>🍽️ 提案レシピ</h2>
      <span class="result-badge" id="resultBadge"></span>
    </div>
    <div class="ingredient-chips" id="ingredientChips"></div>
    <div class="result-content" id="resultContent"></div>
    <button class="retry-btn" onclick="resetAll()">🔄 もう一度試す</button>
  </div>

</div>

<script>
let selectedStyleId = null;
let imageBase64 = null;
let imageMimeType = 'image/jpeg';

// デフォルトスタイル（削除不可）
const DEFAULT_STYLES = [
  { id: 'guts',    icon: '🍖', title: 'ガッツリ系',  desc: 'ボリューム満点・食べ応えあり',   deletable: false },
  { id: 'healthy', icon: '🥗', title: 'ヘルシー系',  desc: '低カロリー・栄養バランス重視',   deletable: false },
  { id: 'bento',   icon: '🍱', title: 'お弁当系',    desc: '冷めても美味しい・作り置きOK',   deletable: false },
];

// ローカルストレージからカスタムスタイルを読み込み
function loadStyles() {
  try {
    const saved = localStorage.getItem('customStyles');
    return saved ? JSON.parse(saved) : [];
  } catch { return []; }
}
function saveStyles(customs) {
  localStorage.setItem('customStyles', JSON.stringify(customs));
}

// カード全体を再描画
function renderCards() {
  const customs = loadStyles();
  const all = [...DEFAULT_STYLES, ...customs];
  const container = document.getElementById('styleCards');
  container.innerHTML = '';

  all.forEach(s => {
    const card = document.createElement('div');
    card.className = 'style-card' + (selectedStyleId === s.id ? ' active' : '');
    card.onclick = () => selectStyle(s.id);
    card.innerHTML = `
      <span class="card-icon">${s.icon}</span>
      <p class="card-title">${s.title}</p>
      <p class="card-desc">${s.desc}</p>
      ${s.deletable ? `<button class="delete-card-btn" onclick="event.stopPropagation(); deleteStyle('${s.id}')">✕</button>` : ''}
    `;
    container.appendChild(card);
  });

  // ＋追加ボタン
  const addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.onclick = openModal;
  addCard.innerHTML = `<span class="add-icon">＋</span><p class="add-label">追加する</p>`;
  container.appendChild(addCard);
}

function selectStyle(id) {
  selectedStyleId = id;
  renderCards();
}

function deleteStyle(id) {
  const customs = loadStyles().filter(s => s.id !== id);
  saveStyles(customs);
  if (selectedStyleId === id) selectedStyleId = null;
  renderCards();
}

// モーダル
const EMOJIS = ['⏱️','💸','🌶️','🥂','🍜','🥩','🍣','🍛','🥘','🧆','🍝','🥞','🍲','🫕','🧇'];
let selectedEmoji = EMOJIS[0];

function openModal() {
  selectedEmoji = EMOJIS[0];
  document.getElementById('customName').value = '';
  document.getElementById('customDesc').value = '';
  renderEmojiPicker();
  document.getElementById('modalOverlay').classList.add('show');
}

function renderEmojiPicker() {
  const picker = document.getElementById('emojiPicker');
  picker.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => { selectedEmoji = e; renderEmojiPicker(); };
    picker.appendChild(btn);
  });
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('show');
  }
}

function addCustomStyle() {
  const name = document.getElementById('customName').value.trim();
  const desc = document.getElementById('customDesc').value.trim();
  if (!name) { document.getElementById('customName').focus(); return; }
  const customs = loadStyles();
  const id = 'custom_' + Date.now();
  customs.push({ id, icon: selectedEmoji, title: name, desc: desc || '', deletable: true });
  saveStyles(customs);
  document.getElementById('modalOverlay').classList.remove('show');
  renderCards();
}

// 画像選択
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const dataUrl = ev.target.result;
    const mimeMatch = dataUrl.match(/data:([^;]+);/);
    imageMimeType = mimeMatch ? mimeMatch[1] : 'image/jpeg';
    if (imageMimeType.includes('heic') || imageMimeType.includes('heif')) imageMimeType = 'image/jpeg';
    imageBase64 = dataUrl.split(',')[1];
    const img = document.getElementById('previewImg');
    img.src = dataUrl;
    img.style.display = 'block';
    document.getElementById('changeBtn').style.display = 'block';
    document.querySelectorAll('.upload-zone .icon, .upload-label, .upload-btn-row').forEach(el => el.style.display = 'none');
    document.getElementById('uploadZone').classList.add('has-image');
  };
  reader.readAsDataURL(file);
}
document.getElementById('fileCamera').addEventListener('change', handleFileSelect);
document.getElementById('fileGallery').addEventListener('change', handleFileSelect);

function showUploadButtons() {
  imageBase64 = null;
  document.getElementById('fileCamera').value = '';
  document.getElementById('fileGallery').value = '';
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('changeBtn').style.display = 'none';
  document.querySelectorAll('.upload-zone .icon, .upload-label, .upload-btn-row').forEach(el => el.style.display = '');
  document.getElementById('uploadZone').classList.remove('has-image');
}

// レシピ生成
async function generate() {
  if (!imageBase64) { alert('写真を選んでください📷'); return; }
  if (!selectedStyleId) { alert('料理スタイルを選んでください！'); return; }

  const customs = loadStyles();
  const all = [...DEFAULT_STYLES, ...customs];
  const style = all.find(s => s.id === selectedStyleId);
  const styleText = `${style.title}（${style.desc}）`;
  const genreText = selectedGenreId && selectedGenreId !== 'なんでもOK' ? selectedGenreId : null;
  const extraNote = document.getElementById('extraNote').value.trim();

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('loadingWrap').style.display = 'block';
  document.getElementById('result').style.display = 'none';

  const prompt = `この写真に写っている食材をすべて認識して、それらを使った料理レシピを提案してください。

スタイル：${styleText}
${genreText ? `料理ジャンル：${genreText}` : ''}
${selectedAllergies.size > 0 ? `【絶対に使わないでください】アレルギー食材：${[...selectedAllergies].join('、')}` : ''}
${extraNote ? `追加メモ：${extraNote}` : ''}

以下の形式で回答してください：

【認識した食材】
（食材名をカンマ区切りで列挙）

【レシピ名】
（料理名）

【所要時間・難易度】
（例：約20分・★☆☆）

【材料（2人分）】
（箇条書き）

【作り方】
（番号付きで手順を記載。簡潔に）

【ポイント】
（1〜2行でコツや工夫）

日本語で、わかりやすく実用的に答えてください。`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageMimeType, data: imageBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await response.json();
    if (!response.ok || data.error) {
      throw new Error(data.error?.message || `APIエラー(${response.status})`);
    }
    const text = data.content?.map(i => i.text || '').join('') || 'レシピを取得できませんでした。';

    // 食材チップを抽出
    const ingredientMatch = text.match(/【認識した食材】\s*\n([^\n【]+)/);
    const chipsContainer = document.getElementById('ingredientChips');
    chipsContainer.innerHTML = '';
    if (ingredientMatch) {
      const items = ingredientMatch[1].split(/[、,，\s]+/).filter(Boolean);
      items.forEach(item => {
        if (item.trim()) {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = item.trim();
          chipsContainer.appendChild(chip);
        }
      });
    }

    const formatted = formatResult(text);
    document.getElementById('resultContent').innerHTML = formatted;

    const badge = document.getElementById('resultBadge');
    badge.textContent = `${style.icon} ${style.title}`;
    badge.className = 'result-badge badge-guts';

    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    const msg = err?.message || JSON.stringify(err);
    alert('エラーが発生しました。\n' + msg);
    console.error(err);
  } finally {
    document.getElementById('loadingWrap').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
  }
}

function formatResult(text) {
  return text
    .replace(/【(.+?)】/g, '<h3>【$1】</h3>')
    .replace(/\n/g, '<br>');
}

function resetAll() {
  imageBase64 = null;
  imageMimeType = 'image/jpeg';
  selectedStyleId = null;
  document.getElementById('fileCamera').value = '';
  document.getElementById('fileGallery').value = '';
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('changeBtn').style.display = 'none';
  document.querySelectorAll('.upload-zone .icon, .upload-label, .upload-sub').forEach(el => el.style.display = '');
  document.getElementById('uploadZone').classList.remove('has-image');
  document.getElementById('extraNote').value = '';
  document.getElementById('result').style.display = 'none';
  selectedGenreId = null;
  selectedAllergies.clear();
  renderCards();
  renderGenres();
  renderAllergies();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}


// ======= ジャンル管理 =======
const DEFAULT_GENRES = ['なんでもOK','麺','丼','炒め物','スープ','サラダ','焼き物'];
let selectedGenreId = null;

function loadGenres() {
  try { const s = localStorage.getItem('customGenres'); return s ? JSON.parse(s) : []; } catch { return []; }
}
function saveGenres(g) { localStorage.setItem('customGenres', JSON.stringify(g)); }

function renderGenres() {
  const customs = loadGenres();
  const all = DEFAULT_GENRES.map(t => ({ id: t, label: t, deletable: false }))
              .concat(customs.map(t => ({ id: t, label: t, deletable: true })));
  const wrap = document.getElementById('genreWrap');
  wrap.innerHTML = '';
  all.forEach(g => {
    const tag = document.createElement('span');
    tag.className = 'genre-tag' + (selectedGenreId === g.id ? ' active' : '');
    tag.onclick = () => { selectedGenreId = selectedGenreId === g.id ? null : g.id; renderGenres(); };
    tag.innerHTML = g.label + (g.deletable ? `<span class="del-tag" onclick="event.stopPropagation();deleteGenre('${g.id}')">✕</span>` : '');
    wrap.appendChild(tag);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'genre-add-btn';
  addBtn.textContent = '＋ 追加';
  addBtn.onclick = () => { document.getElementById('customGenreName').value = ''; document.getElementById('genreModalOverlay').classList.add('show'); };
  wrap.appendChild(addBtn);
}

function deleteGenre(id) {
  const g = loadGenres().filter(x => x !== id);
  saveGenres(g);
  if (selectedGenreId === id) selectedGenreId = null;
  renderGenres();
}

function addCustomGenre() {
  const name = document.getElementById('customGenreName').value.trim();
  if (!name) { document.getElementById('customGenreName').focus(); return; }
  const g = loadGenres();
  if (!g.includes(name)) { g.push(name); saveGenres(g); }
  document.getElementById('genreModalOverlay').classList.remove('show');
  renderGenres();
}

function closeGenreModal(e) {
  if (e.target === document.getElementById('genreModalOverlay')) document.getElementById('genreModalOverlay').classList.remove('show');
}
// ======= ここまでジャンル =======


// ======= アレルギー管理 =======
const DEFAULT_ALLERGIES = ['卵','乳製品','小麦','えび','かに','そば','落花生','ナッツ類','魚介類'];
let selectedAllergies = new Set();

function loadCustomAllergies() {
  try { const s = localStorage.getItem('customAllergies'); return s ? JSON.parse(s) : []; } catch { return []; }
}
function saveCustomAllergies(a) { localStorage.setItem('customAllergies', JSON.stringify(a)); }

function renderAllergies() {
  const customs = loadCustomAllergies();
  const all = DEFAULT_ALLERGIES.map(t => ({ id: t, label: t, deletable: false }))
              .concat(customs.map(t => ({ id: t, label: t, deletable: true })));
  const wrap = document.getElementById('allergyWrap');
  wrap.innerHTML = '';
  all.forEach(a => {
    const tag = document.createElement('span');
    tag.className = 'allergy-tag' + (selectedAllergies.has(a.id) ? ' active' : '');
    tag.onclick = () => {
      if (selectedAllergies.has(a.id)) selectedAllergies.delete(a.id);
      else selectedAllergies.add(a.id);
      renderAllergies();
    };
    tag.innerHTML = a.label + (a.deletable ? `<span class="del-tag" onclick="event.stopPropagation();deleteAllergy('${a.id}')">✕</span>` : '');
    wrap.appendChild(tag);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'allergy-add-btn';
  addBtn.textContent = '＋ 追加';
  addBtn.onclick = () => { document.getElementById('customAllergyName').value = ''; document.getElementById('allergyModalOverlay').classList.add('show'); };
  wrap.appendChild(addBtn);
}

function deleteAllergy(id) {
  const a = loadCustomAllergies().filter(x => x !== id);
  saveCustomAllergies(a);
  selectedAllergies.delete(id);
  renderAllergies();
}

function addCustomAllergy() {
  const name = document.getElementById('customAllergyName').value.trim();
  if (!name) { document.getElementById('customAllergyName').focus(); return; }
  const a = loadCustomAllergies();
  if (!a.includes(name)) { a.push(name); saveCustomAllergies(a); }
  document.getElementById('allergyModalOverlay').classList.remove('show');
  renderAllergies();
}

function closeAllergyModal(e) {
  if (e.target === document.getElementById('allergyModalOverlay')) document.getElementById('allergyModalOverlay').classList.remove('show');
}
// ======= ここまでアレルギー =======

// 初期描画
renderCards();
renderGenres();
renderAllergies();
</script>
